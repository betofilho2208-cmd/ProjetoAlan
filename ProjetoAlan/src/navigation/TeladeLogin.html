<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../Styles/TeladeLogin.css">
    <title>Tela de Login</title>
</head>

<body>

    <header class="container">

        <div class="Esquerda">
            <h1>Bem-vindo!</h1>
            <p>Faça login para continuar.</p>
        </div>

        <div class="Direita">
            <main class="parteLogin">
                <section class="Logo">
                    <img src="../img/1000274377_2__Traced_-removebg-preview.png" alt="Ícone de Login">
                </section>
                <input type="email" class="email" placeholder="E-mail" required>
                <input type="password" class="password" placeholder="Senha" required>

                <section class="clienteEmpresa">
                    <label>
                        <input type="radio" name="tipoUsuario" value="Cliente" checked>
                        Cliente
                    </label>
                    <label>
                        <input type="radio" name="tipoUsuario" value="Guincheiro">
                        Guincheiro
                    </label>

                </section>
                <button type="submit" class="loginButton" onclick="login()">Entrar</button>
                <a href="#">Esqueci minha senha</a>

            </main>
        </div>
    </header>
    <script src="../JS/TeladeLogin.js"></script>
</body>


</html>
